<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉑適物理治療</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light site-nav">
  <div class="container-fluid px-4">

    <!-- Logo -->
    <a class="navbar-brand" href="/">
      <img src="{{ url_for('static', filename='logo.png') }}"
           height="44" alt="鉑適物理治療"
           style="mix-blend-mode:multiply;max-height:44px;width:auto">
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#nav"
            style="color:#456070">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if request.path == '/' or '/calendar' in request.path %}active{% endif %}"
             href="/">
            <i class="bi bi-calendar3 me-1"></i>預約日曆
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if '/patients' in request.path %}active{% endif %}"
             href="/patients">
            <i class="bi bi-people me-1"></i>個案管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if '/records/new' in request.path %}active{% endif %}"
             href="/records/new">
            <i class="bi bi-file-medical me-1"></i>新增病歷
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if '/report' in request.path %}active{% endif %}"
             href="/report">
            <i class="bi bi-bar-chart me-1"></i>報表
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link nav-item-link dropdown-toggle {% if '/salary' in request.path or '/therapists/settings' in request.path %}active{% endif %}"
             href="#" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-cash-stack me-1"></i>薪資
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="border-radius:12px;border-color:var(--border)">
            <li><a class="dropdown-item" href="/salary"><i class="bi bi-calculator me-1"></i>薪資計算</a></li>
            <li><a class="dropdown-item" href="/therapists/settings"><i class="bi bi-sliders me-1"></i>薪資設定</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
