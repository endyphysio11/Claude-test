<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物理治療所管理系統</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
  <div class="container-fluid px-3">
    <a class="navbar-brand fw-bold fs-5" href="/">
      <i class="bi bi-hospital-fill me-2"></i>物理治療所
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link px-3 {% if request.path == '/' or request.path == '/calendar' %}active{% endif %}"
             href="/">
            <i class="bi bi-calendar3 me-1"></i>預約日曆
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 {% if '/patients' in request.path %}active{% endif %}"
             href="/patients">
            <i class="bi bi-people-fill me-1"></i>個案管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 {% if '/records/new' in request.path %}active{% endif %}"
             href="/records/new">
            <i class="bi bi-file-medical-fill me-1"></i>新增病歷
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link px-3 {% if '/report' in request.path %}active{% endif %}"
             href="/report">
            <i class="bi bi-bar-chart-fill me-1"></i>每日報表
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-3 py-3">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
