<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鉑適物理治療</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='style.css') }}" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light site-nav">
  <div class="container-fluid px-4">

    <!-- Logo -->
    <a class="navbar-brand" href="/">
      <svg viewBox="0 0 260 58" height="44" xmlns="http://www.w3.org/2000/svg" aria-label="The Platinum 鉑適物理治療">
        <!-- THE PLATINUM -->
        <text x="0" y="18"
              font-family="'Inter','Arial',sans-serif"
              font-size="17.5" font-weight="700"
              fill="#1a4f72" letter-spacing="2.2">THE PLATINUM</text>
        <!-- PHYSICAL THERAPY -->
        <text x="0.5" y="28"
              font-family="'Inter','Arial',sans-serif"
              font-size="6.2" font-weight="400"
              fill="#2e7faa" letter-spacing="3.0">PHYSICAL THERAPY</text>
        <!-- & WELLNESS CENTER -->
        <text x="0.5" y="37"
              font-family="'Inter','Arial',sans-serif"
              font-size="6.2" font-weight="400"
              fill="#2e7faa" letter-spacing="3.0">&amp; WELLNESS CENTER</text>
        <!-- 鉑 適 物 理 治 療 -->
        <text x="0.5" y="53"
              font-family="'Noto Sans TC','Inter','Arial',sans-serif"
              font-size="10" fill="#1a4f72" letter-spacing="8.5">鉑適物理治療</text>
        <!-- Knee joint illustration -->
        <g transform="translate(208, 2)" fill="none" stroke="#b8c8d0"
           stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <!-- Femoral condyles (closed oval) -->
          <path d="M16,0 C10,0 5,4.5 5,10.5 C5,16 8,20.5 12.5,22.5
                   C14,23.2 15,23.5 16,23.5 C17,23.5 18,23.2 19.5,22.5
                   C24,20.5 27,16 27,10.5 C27,4.5 22,0 16,0 Z"/>
          <!-- Intercondylar notch (V-notch at femur bottom) -->
          <path d="M12.5,23.5 C13.8,26 15,26.8 16,26.8
                   C17,26.8 18.2,26 19.5,23.5"/>
          <!-- Tibial spine (small bump on tibia top) -->
          <path d="M13,30.5 C14.3,28 15.3,27.5 16,27.5
                   C16.7,27.5 17.7,28 19,30.5"/>
          <!-- Tibia (closed tapered shape with plateau) -->
          <path d="M5,32 C9,30.5 12.5,30 16,30 C19.5,30 23,30.5 27,32
                   C28.5,38 28.5,46 26.5,51 C24.5,54.5 21,55.5 16,55.5
                   C11,55.5 7.5,54.5 5.5,51 C3.5,46 3.5,38 5,32 Z"/>
        </g>
      </svg>
    </a>

    <!-- Mobile toggler -->
    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#nav"
            style="color:#456070">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav ms-auto gap-1">
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if request.path == '/' or '/calendar' in request.path %}active{% endif %}"
             href="/">
            <i class="bi bi-calendar3 me-1"></i>預約日曆
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if '/patients' in request.path %}active{% endif %}"
             href="/patients">
            <i class="bi bi-people me-1"></i>個案管理
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if '/records/new' in request.path %}active{% endif %}"
             href="/records/new">
            <i class="bi bi-file-medical me-1"></i>新增病歷
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link nav-item-link {% if '/report' in request.path %}active{% endif %}"
             href="/report">
            <i class="bi bi-bar-chart me-1"></i>報表
          </a>
        </li>
        <li class="nav-item dropdown">
          <a class="nav-link nav-item-link dropdown-toggle {% if '/salary' in request.path or '/therapists/settings' in request.path %}active{% endif %}"
             href="#" data-bs-toggle="dropdown" aria-expanded="false">
            <i class="bi bi-cash-stack me-1"></i>薪資
          </a>
          <ul class="dropdown-menu dropdown-menu-end shadow-sm" style="border-radius:12px;border-color:var(--border)">
            <li><a class="dropdown-item" href="/salary"><i class="bi bi-calculator me-1"></i>薪資計算</a></li>
            <li><a class="dropdown-item" href="/therapists/settings"><i class="bi bi-sliders me-1"></i>薪資設定</a></li>
          </ul>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid px-4 py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show mb-3" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
