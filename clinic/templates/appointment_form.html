{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center">
  <div class="col-lg-7">

    <div class="card shadow-sm">
      <div class="card-header gold-header">
        <p class="text-uppercase mb-0" style="font-size:0.65rem;letter-spacing:0.12em;color:var(--gold)">APPOINTMENT</p>
        <h6 class="mb-0 fw-semibold">{{ '編輯預約' if appointment else '新增預約' }}</h6>
      </div>
      <div class="card-body">

        <form method="post">

          <!-- 個案 -->
          <div class="mb-3">
            <label class="form-label fw-semibold">個案 <span class="text-danger">*</span></label>
            <select name="patient_id" class="form-select" required>
              <option value="">— 請選擇個案 —</option>
              {% for p in patients %}
              <option value="{{ p.id }}"
                {% if appointment and appointment.patient_id == p.id %}selected{% endif %}>
                {{ p.name }}{% if p.phone %} ({{ p.phone }}){% endif %}
              </option>
              {% endfor %}
            </select>
            <div class="form-text">
              找不到個案？<a href="/patients/new" target="_blank">新增個案</a>
            </div>
          </div>

          <!-- 治療師 -->
          <div class="mb-3">
            <label class="form-label fw-semibold">治療師 <span class="text-danger">*</span></label>
            <div class="d-flex gap-3 flex-wrap">
              {% for t in therapists %}
              <div class="form-check">
                <input class="form-check-input" type="radio" name="therapist_id"
                       id="t{{ t.id }}" value="{{ t.id }}" required
                       {% if (appointment and appointment.therapist_id == t.id) or
                             (not appointment and default_therapist == t.id|string) %}checked{% endif %}>
                <label class="form-check-label" for="t{{ t.id }}">{{ t.name }}</label>
              </div>
              {% endfor %}
            </div>
          </div>

          <!-- 日期 + 時間 -->
          <div class="row g-3 mb-3">
            <div class="col-sm-6">
              <label class="form-label fw-semibold">日期 <span class="text-danger">*</span></label>
              <input type="date" name="date" class="form-control" required
                     value="{{ default_date }}">
            </div>
            <div class="col-sm-6">
              <label class="form-label fw-semibold">開始時間 <span class="text-danger">*</span></label>
              <select name="start_time" class="form-select" required>
                {% for slot in time_slots %}
                <option value="{{ slot }}"
                  {% if slot == (appointment.start_time if appointment else default_time) %}selected{% endif %}>
                  {{ slot }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- 服務項目 -->
          <div class="mb-3">
            <label class="form-label fw-semibold">服務項目 <span class="text-danger">*</span></label>
            <div class="row g-2">
              {% for val, label, prices in service_types %}
              <div class="col-6 col-sm-4">
                <label class="d-block" style="cursor:pointer">
                  <input type="radio" name="service_type" value="{{ val }}" class="visually-hidden svc-radio"
                         onchange="applyServicePreset('{{ val }}')"
                         {% if (appointment and appointment.service_type == val) or
                               (not appointment and val == 'full_treatment') %}checked{% endif %}>
                  <div class="svc-card text-center p-2 {% if (appointment and appointment.service_type == val) or (not appointment and val == 'full_treatment') %}selected{% endif %}"
                       style="border:1.5px solid var(--border);border-radius:10px;font-size:0.8rem;transition:all 0.15s">
                    <div class="fw-semibold" style="color:var(--brand-dark);font-size:0.82rem">{{ label }}</div>
                    <div style="font-size:0.72rem;color:var(--text-muted);margin-top:2px">
                      {% if prices | length == 1 %}NT$ {{ prices[0] }}
                      {% else %}NT$ {{ prices[0] }} / {{ prices[1] }}{% endif %}
                    </div>
                  </div>
                </label>
              </div>
              {% endfor %}
            </div>
          </div>

          <!-- 時長 + 費用 -->
          <div class="row g-3 mb-3">
            <div class="col-sm-5">
              <label class="form-label fw-semibold">治療時長</label>
              <select name="duration" class="form-select">
                {% for d in duration_options %}
                <option value="{{ d }}"
                  {% if appointment and appointment.duration == d %}selected
                  {% elif not appointment and d == 60 %}selected{% endif %}>
                  {{ d }} 分鐘
                </option>
                {% endfor %}
              </select>
            </div>
            <div class="col-sm-7">
              <label class="form-label fw-semibold">費用 (NT$)</label>
              <input type="number" name="cost" id="cost" class="form-control" min="0" step="50"
                     value="{{ appointment.cost | int if appointment else '' }}"
                     placeholder="選擇服務項目後自動帶入">
              <div class="d-flex gap-2 mt-2 flex-wrap" id="cost-presets"></div>
            </div>
          </div>

          <!-- 付款方式 -->
          <div class="mb-3">
            <label class="form-label fw-semibold">付款方式</label>
            <div class="d-flex gap-3 flex-wrap">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="payment_method"
                       id="pay_cash" value="cash" onchange="togglePayment()"
                       {% if not appointment or not appointment.get('payment_method') or appointment.get('payment_method') == 'cash' %}checked{% endif %}>
                <label class="form-check-label" for="pay_cash">
                  <i class="bi bi-cash me-1"></i>現金
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="payment_method"
                       id="pay_transfer" value="transfer" onchange="togglePayment()"
                       {% if appointment and appointment.get('payment_method') == 'transfer' %}checked{% endif %}>
                <label class="form-check-label" for="pay_transfer">
                  <i class="bi bi-bank me-1"></i>匯款
                </label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="payment_method"
                       id="pay_session" value="session" onchange="togglePayment()"
                       {% if appointment and appointment.get('payment_method') == 'session' %}checked{% endif %}>
                <label class="form-check-label" for="pay_session">
                  <i class="bi bi-card-checklist me-1"></i>使用堂數
                </label>
              </div>
            </div>
          </div>

          <!-- 堂數方案選擇 -->
          <div class="mb-3 p-3 rounded" id="package-section"
               style="display:none;background:var(--gold-light);border:1px solid var(--gold-mid)">
            <label class="form-label fw-semibold mb-2">堂數方案</label>
            <select name="session_package_id" id="session_package_select" class="form-select mb-2">
              <option value="">— 請先選擇個案 —</option>
              {% if appointment and patient_packages is defined %}
                {% for pkg in patient_packages %}
                <option value="{{ pkg.id }}"
                  data-remaining="{{ pkg.total_sessions - pkg.used_sessions }}"
                  data-price="{{ pkg.price_per_session | int }}"
                  {% if appointment.get('session_package_id') == pkg.id %}selected{% endif %}>
                  {{ pkg.package_type }} — 剩 {{ pkg.total_sessions - pkg.used_sessions }} / {{ pkg.total_sessions }} 堂（NT${{ pkg.price_per_session | int }}/堂）
                </option>
                {% endfor %}
              {% endif %}
            </select>
            <div id="package-info" class="small text-muted"></div>
            <div class="mt-2">
              <a id="buy-package-link" href="#" class="small" target="_blank" style="display:none;color:var(--gold)">
                <i class="bi bi-plus-circle me-1"></i>為此個案購買新方案
              </a>
            </div>
          </div>

          <!-- 狀態（僅編輯模式顯示） -->
          {% if appointment %}
          <div class="mb-3">
            <label class="form-label fw-semibold">狀態</label>
            <select name="status" class="form-select">
              <option value="scheduled" {% if appointment.status == 'scheduled' %}selected{% endif %}>已預約</option>
              <option value="completed" {% if appointment.status == 'completed' %}selected{% endif %}>已完成</option>
              <option value="cancelled" {% if appointment.status == 'cancelled' %}selected{% endif %}>已取消</option>
            </select>
          </div>
          {% endif %}

          <!-- 個案來源 -->
          <div class="mb-3">
            <label class="form-label fw-semibold">個案來源</label>
            <div class="d-flex gap-4 mb-2">
              <div class="form-check">
                <input class="form-check-input" type="radio" name="is_designated" id="src_designated"
                       value="1" onchange="toggleReferral()"
                       {% if not appointment or appointment.is_designated != 0 %}checked{% endif %}>
                <label class="form-check-label" for="src_designated">指定治療師</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="radio" name="is_designated" id="src_not_designated"
                       value="0" onchange="toggleReferral()"
                       {% if appointment and appointment.is_designated == 0 %}checked{% endif %}>
                <label class="form-check-label" for="src_not_designated">非指定治療師</label>
              </div>
            </div>
            <div id="referral_row"
                 {% if not appointment or appointment.is_designated != 0 %}style="display:none"{% endif %}>
              <select name="referral_source" class="form-select" style="max-width:280px">
                <option value="">— 請選擇來源渠道 —</option>
                {% for val, label in referral_sources %}
                <option value="{{ val }}"
                  {% if appointment and appointment.referral_source == val %}selected{% endif %}>
                  {{ label }}
                </option>
                {% endfor %}
              </select>
            </div>
          </div>

          <!-- 備註 -->
          <div class="mb-4">
            <label class="form-label fw-semibold">備註</label>
            <textarea name="notes" class="form-control" rows="2"
                      placeholder="其他說明…">{{ appointment.notes if appointment else '' }}</textarea>
          </div>

          <div class="d-flex gap-2 justify-content-end">
            <a href="/calendar?date={{ default_date }}" class="btn btn-secondary">
              <i class="bi bi-x-lg me-1"></i>取消
            </a>
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>{{ '更新' if appointment else '新增' }}
            </button>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>

<style>
.svc-card:hover { border-color: var(--gold) !important; background: var(--gold-light); }
.svc-card.selected { border-color: var(--brand-dark) !important; background: var(--gold-light); }
</style>

<script>
const SERVICE_PRESETS = {
  {% for val, label, prices in service_types %}
  '{{ val }}': {{ prices | tojson }},
  {% endfor %}
};

function applyServicePreset(val) {
  const prices    = SERVICE_PRESETS[val] || [];
  const costInput = document.getElementById('cost');
  const presetsDiv = document.getElementById('cost-presets');

  // Highlight selected card
  document.querySelectorAll('.svc-card').forEach(c => c.classList.remove('selected'));
  const radio = document.querySelector(`.svc-radio[value="${val}"]`);
  if (radio) radio.closest('label').querySelector('.svc-card').classList.add('selected');

  // Auto-fill cost
  if (prices.length >= 1) costInput.value = prices[0];

  // Render quick-fill buttons (only for multi-price options)
  if (prices.length > 1) {
    presetsDiv.innerHTML = prices.map(p =>
      `<button type="button" class="btn btn-sm btn-outline-secondary"
               onclick="document.getElementById('cost').value='${p}'">
         NT$ ${p.toLocaleString()}
       </button>`
    ).join('');
  } else {
    presetsDiv.innerHTML = '';
  }
}

function toggleReferral() {
  const notDesignated = document.getElementById('src_not_designated').checked;
  document.getElementById('referral_row').style.display = notDesignated ? '' : 'none';
}

function togglePayment() {
  const isSession = document.getElementById('pay_session').checked;
  const section = document.getElementById('package-section');
  section.style.display = isSession ? '' : 'none';
  if (isSession) {
    const pid = document.querySelector('[name="patient_id"]').value;
    if (pid) loadPackages(pid);
  }
}

async function loadPackages(patientId) {
  const sel = document.getElementById('session_package_select');
  const info = document.getElementById('package-info');
  const buyLink = document.getElementById('buy-package-link');

  sel.innerHTML = '<option value="">載入中...</option>';
  try {
    const res = await fetch(`/api/patients/${patientId}/packages`);
    const pkgs = await res.json();
    if (pkgs.length === 0) {
      sel.innerHTML = '<option value="">此個案尚無有效堂數方案</option>';
      info.textContent = '請先至個案病歷頁面購買方案';
    } else {
      sel.innerHTML = '<option value="">— 請選擇方案 —</option>';
      pkgs.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p.id;
        opt.dataset.remaining = p.remaining;
        opt.dataset.price = p.price_per_session;
        opt.textContent = `${p.package_type} — 剩 ${p.remaining} / ${p.total} 堂（NT$${p.price_per_session}/堂）`;
        {% if appointment %}
        if (p.id == {{ appointment.get('session_package_id') or 'null' }}) opt.selected = true;
        {% endif %}
        sel.appendChild(opt);
      });
      updatePackageInfo();
    }
    buyLink.href = `/patients/${patientId}/records`;
    buyLink.style.display = '';
  } catch (e) {
    sel.innerHTML = '<option value="">載入失敗</option>';
  }
}

function updatePackageInfo() {
  const sel = document.getElementById('session_package_select');
  const info = document.getElementById('package-info');
  const opt = sel.options[sel.selectedIndex];
  if (opt && opt.dataset.remaining !== undefined) {
    const rem = parseInt(opt.dataset.remaining);
    const price = opt.dataset.price;
    info.innerHTML = `剩餘 <strong>${rem}</strong> 堂 · 本次費用 NT$${price}`;
    if (price) document.getElementById('cost').value = price;
    if (rem <= 0) {
      info.innerHTML += ' <span class="text-danger">（堂數已用盡）</span>';
    }
  } else {
    info.textContent = '';
  }
}

document.getElementById('session_package_select').addEventListener('change', updatePackageInfo);
document.querySelector('[name="patient_id"]').addEventListener('change', function () {
  if (document.getElementById('pay_session').checked) loadPackages(this.value);
});

// Initialise on load
document.addEventListener('DOMContentLoaded', function () {
  const checked = document.querySelector('.svc-radio:checked');
  if (checked) applyServicePreset(checked.value);
  {% if appointment %}
  document.getElementById('cost').value = '{{ appointment.cost | int }}';
  {% endif %}
  togglePayment();
  {% if appointment and appointment.get('payment_method') == 'session' %}
  const pid = document.querySelector('[name="patient_id"]').value;
  if (pid) loadPackages(pid);
  {% endif %}
});
</script>

{% endblock %}
