{% extends "base.html" %}
{% block content %}

<!-- FullCalendar -->
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

<!-- Therapist legend + new appointment button -->
<div class="d-flex align-items-center justify-content-between mb-3 flex-wrap gap-2">
  <div class="d-flex gap-3 align-items-center flex-wrap">
    {% set colors = {'Endy':'#4a6fa5','Jeffrey':'#4a9070','Diana':'#b8976c','Rex':'#7a5fa0','Alison':'#b85c78'} %}
    {% for t in therapists %}
    <a href="/therapists/{{ t.id }}" class="d-flex align-items-center gap-2 text-decoration-none">
      <span style="width:10px;height:10px;border-radius:2px;background:{{ colors.get(t.name,'#6b7280') }};display:inline-block;flex-shrink:0"></span>
      <span style="font-size:0.82rem;color:var(--text-muted)">{{ t.name }}</span>
    </a>
    {% endfor %}
  </div>
  <a href="/appointments/new" class="btn btn-sm btn-primary px-3">
    <i class="bi bi-plus-lg me-1"></i>新增預約
  </a>
</div>

<!-- Calendar container -->
<div class="card p-3" style="min-height:600px">
  <div id="calendar"></div>
</div>

<!-- Event detail modal -->
<div class="modal fade" id="eventModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:380px">
    <div class="modal-content border-0 shadow">

      <div class="modal-header pb-1" id="modal-header-bar" style="border-radius:8px 8px 0 0">
        <div>
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;opacity:0.75"
               id="modal-therapist"></div>
          <h6 class="modal-title fw-bold mb-0 mt-1" id="modal-title"></h6>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body py-3 px-4">
        <div class="d-flex flex-column gap-2">
          <div class="d-flex justify-content-between">
            <span style="font-size:0.78rem;color:var(--text-muted)">時間</span>
            <span id="modal-time" style="font-size:0.85rem"></span>
          </div>
          <div class="d-flex justify-content-between">
            <span style="font-size:0.78rem;color:var(--text-muted)">服務項目</span>
            <span id="modal-service" style="font-size:0.85rem;text-align:right"></span>
          </div>
          <div class="d-flex justify-content-between">
            <span style="font-size:0.78rem;color:var(--text-muted)">時長</span>
            <span id="modal-duration" style="font-size:0.85rem"></span>
          </div>
          <div class="d-flex justify-content-between">
            <span style="font-size:0.78rem;color:var(--text-muted)">費用</span>
            <span id="modal-cost" style="font-size:0.85rem"></span>
          </div>
          <div class="d-flex justify-content-between">
            <span style="font-size:0.78rem;color:var(--text-muted)">付款方式</span>
            <span id="modal-payment" style="font-size:0.85rem"></span>
          </div>
          <div id="modal-notes-row" class="d-flex justify-content-between" style="display:none!important">
            <span style="font-size:0.78rem;color:var(--text-muted)">備註</span>
            <span id="modal-notes" style="font-size:0.82rem;font-style:italic;color:var(--text-muted);text-align:right;max-width:220px"></span>
          </div>
          <div class="pt-1">
            <span id="modal-status" class="badge rounded-pill"></span>
          </div>
        </div>
      </div>

      <div class="modal-footer pt-0 gap-2 flex-wrap justify-content-start px-4 pb-3" style="border:none">
        <a id="modal-edit-btn" href="#" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-pencil me-1"></i>編輯
        </a>
        <a id="modal-record-btn" href="#" class="btn btn-sm btn-outline-secondary">
          <i class="bi bi-file-earmark-plus me-1"></i>病歷
        </a>
        <a id="modal-checkout-btn" href="#" class="btn btn-sm btn-warning text-dark">
          <i class="bi bi-cash-coin me-1"></i>結帳
        </a>
        <form id="modal-cancel-form" method="post" class="m-0"
              onsubmit="return confirm('確定取消此預約？')">
          <button type="submit" class="btn btn-sm btn-outline-danger">
            <i class="bi bi-x-lg"></i>
          </button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>

const SVC_NAMES = {
  assessment:    '單純評估衛教',
  full_treatment:'完整治療',
  exercise:      '運動訓練',
  winback:       '高階儀器 — Winback',
  shockwave:     '高階儀器 — 震波',
  space_rental:  '場租',
};
const SVC_SHORT = {
  assessment:    '評估',
  full_treatment:'治療',
  exercise:      '運動',
  winback:       'Winback',
  shockwave:     '震波',
  space_rental:  '場租',
};

document.addEventListener('DOMContentLoaded', function () {

  const calendarEl = document.getElementById('calendar');
  const modal      = new bootstrap.Modal(document.getElementById('eventModal'));

  const calendar = new FullCalendar.Calendar(calendarEl, {

    // ── Views ──────────────────────────────────────────
    initialView: 'timeGridWeek',
    headerToolbar: {
      left:   'prev,next today',
      center: 'title',
      right:  'timeGridWeek,timeGridDay',
    },
    buttonText: { today: '今天', week: '週', day: '日' },
    titleFormat: function(info) {
      const s  = new Date(info.start.marker);
      const eX = new Date(info.end.marker);
      const e  = new Date(eX.getTime() - 86400000); // exclusive → inclusive
      const year = s.getFullYear();
      const sm = s.getMonth() + 1, sd = s.getDate();
      const em = e.getMonth() + 1, ed = e.getDate();
      // Day view
      if (s.toDateString() === e.toDateString()) {
        return `${year}年${sm}月${sd}日`;
      }
      // Week view
      const range = sm === em
        ? `${sd}日 – ${ed}日`
        : `${sm}月${sd}日 – ${em}月${ed}日`;
      return `${year}年${sm}月　${range}`;
    },
    dayHeaderFormat: { weekday: 'short', day: 'numeric' },

    // ── Time range (full 24h, Google-Calendar style) ───
    slotMinTime:  '00:00:00',
    slotMaxTime:  '24:00:00',
    slotDuration: '00:30:00',
    scrollTime:   '09:00:00',
    hiddenDays:   [0, 6],
    allDaySlot:   false,
    nowIndicator: true,
    businessHours: false,

    // ── Interaction ────────────────────────────────────
    editable:     true,
    selectable:   true,
    selectMirror: true,
    eventResizableFromStart: true,
    height:        '720px',

    // ── Events from API ────────────────────────────────
    events: '/appointments/api',

    // ── Click empty slot → new appointment ────────────
    select: function (info) {
      const d = info.startStr.slice(0, 10);
      const t = info.startStr.slice(11, 16);
      window.location.href = `/appointments/new?date=${d}&start_time=${t}`;
    },

    // ── Click event → show detail modal ───────────────
    eventClick: function (info) {
      const ev = info.event;
      const p  = ev.extendedProps;

      const fmt = t => t.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', hour12: false });
      const dateStr = ev.start.toLocaleDateString('zh-TW', { month:'long', day:'numeric', weekday:'short' });

      document.getElementById('modal-title').textContent     = ev.title;
      document.getElementById('modal-therapist').textContent = p.therapist_name;
      document.getElementById('modal-time').textContent      = `${dateStr}　${fmt(ev.start)} – ${fmt(ev.end)}`;
      document.getElementById('modal-service').textContent   = SVC_NAMES[p.service_type] || '—';
      document.getElementById('modal-duration').textContent  = `${p.duration} 分鐘`;
      document.getElementById('modal-cost').textContent      = `NT$ ${p.cost.toLocaleString()}`;
      const pmMap = { cash: '現金', transfer: '匯款', session: '使用堂數' };
      const pmBadge = p.payment_status === 'paid'
        ? '<span class="badge bg-success-subtle text-success-emphasis ms-1">已付</span>'
        : '<span class="badge bg-warning-subtle text-warning-emphasis ms-1">待付</span>';
      document.getElementById('modal-payment').innerHTML =
        (pmMap[p.payment_method] || p.payment_method) + pmBadge;

      const notesRow = document.getElementById('modal-notes-row');
      if (p.notes) {
        document.getElementById('modal-notes').textContent = p.notes;
        notesRow.style.display = 'flex';
      } else {
        notesRow.style.display = 'none';
      }

      const badge = document.getElementById('modal-status');
      const statusMap = {
        scheduled: ['已預約',  'bg-warning text-dark'],
        completed: ['已完成',  'bg-success text-white'],
        cancelled: ['已取消',  'bg-secondary text-white'],
      };
      const [txt, cls] = statusMap[p.status] || ['—', 'bg-secondary'];
      badge.textContent  = txt;
      badge.className    = `badge rounded-pill ${cls}`;

      // Set modal header background to match event colour
      const hdr = document.getElementById('modal-header-bar');
      hdr.style.backgroundColor = ev.backgroundColor || '#1c1c1c';
      hdr.style.color = '#fff';

      const id = ev.id;
      document.getElementById('modal-edit-btn').href     = `/appointments/${id}/edit`;
      document.getElementById('modal-checkout-btn').href = `/appointments/${id}/checkout`;

      // Route record button based on service type
      const SERVICE_RECORD_TYPES = new Set(['exercise', 'space_rental']);
      const recordBtn = document.getElementById('modal-record-btn');
      if (SERVICE_RECORD_TYPES.has(p.service_type)) {
        recordBtn.href = `/service-records/new?patient_id=${p.patient_id}&appointment_id=${id}`;
        recordBtn.innerHTML = '<i class="bi bi-activity me-1"></i>服務紀錄';
      } else {
        recordBtn.href = `/records/new?patient_id=${p.patient_id}&appointment_id=${id}`;
        recordBtn.innerHTML = '<i class="bi bi-file-earmark-plus me-1"></i>病歷';
      }
      document.getElementById('modal-cancel-form').action   = `/appointments/${id}/cancel`;
      // 結帳：取消的不顯示；已付款的顯示灰色
      const checkoutBtn = document.getElementById('modal-checkout-btn');
      if (p.status === 'cancelled') {
        checkoutBtn.style.display = 'none';
      } else if (p.payment_status === 'paid') {
        checkoutBtn.className = 'btn btn-sm btn-outline-secondary disabled';
        checkoutBtn.innerHTML = '<i class="bi bi-check-circle me-1"></i>已結帳';
      } else {
        checkoutBtn.style.display = '';
        checkoutBtn.className = 'btn btn-sm btn-warning text-dark';
        checkoutBtn.innerHTML = '<i class="bi bi-cash-coin me-1"></i>結帳';
      }

      modal.show();
    },

    // ── Drag to reschedule ─────────────────────────────
    eventDrop: function (info) {
      const s    = info.event.start;
      const date = s.toISOString().slice(0, 10);
      const time = `${String(s.getHours()).padStart(2,'0')}:${String(s.getMinutes()).padStart(2,'0')}`;
      fetch(`/appointments/${info.event.id}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, start_time: time }),
      }).then(r => r.json()).then(d => { if (!d.ok) info.revert(); })
        .catch(() => info.revert());
    },

    // ── Resize to change duration ──────────────────────
    eventResize: function (info) {
      const s    = info.event.start;
      const e    = info.event.end;
      const date = s.toISOString().slice(0, 10);
      const time = `${String(s.getHours()).padStart(2,'0')}:${String(s.getMinutes()).padStart(2,'0')}`;
      const dur  = Math.round((e - s) / 60000);
      fetch(`/appointments/${info.event.id}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ date, start_time: time, duration: dur }),
      }).then(r => r.json()).then(d => { if (!d.ok) info.revert(); })
        .catch(() => info.revert());
    },

    // ── Custom event display ───────────────────────────
    eventContent: function (arg) {
      const p   = arg.event.extendedProps;
      const svc = SVC_SHORT[p.service_type] || '';
      return {
        html: `<div class="fc-event-inner">
          <div class="fc-event-patient">${arg.event.title}</div>
          <div class="fc-event-meta">${p.therapist_name}&ensp;·&ensp;${svc}&ensp;·&ensp;NT$${p.cost.toLocaleString()}</div>
        </div>`
      };
    },

  });

  calendar.render();

  // Inject now-indicator styles AFTER FullCalendar's own CSS so they win
  const nowStyle = document.createElement('style');
  nowStyle.textContent = `
    .fc-timegrid-now-indicator-line {
      border-top: 3px solid #e8453c !important;
    }
    .fc-timegrid-now-indicator-arrow {
      border-width: 0 !important;
      border-color: transparent !important;
      background-color: #e8453c !important;
      border-radius: 50% !important;
      width: 12px !important;
      height: 12px !important;
      margin-top: -5px !important;
      margin-left: -4px !important;
    }
  `;
  document.head.appendChild(nowStyle);
});
</script>
{% endblock %}
